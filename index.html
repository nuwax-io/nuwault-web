<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/png" href="/assets/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Nuwault" />
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      font-src 'self';
      connect-src 'self';
      manifest-src 'self';
      worker-src 'self';
      base-uri 'self';
      form-action 'none';
    " />

    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="theme-color" content="%VITE_PWA_THEME_COLOR%" />
    <meta name="author" content="%VITE_APP_AUTHOR%" />
    <meta name="keywords" content="%VITE_APP_KEYWORDS%" />
    
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_APP_NAME%" />
    <meta property="og:title" content="%VITE_APP_NAME% - %VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:url" content="%VITE_APP_URL%/" />
    <meta property="og:image" content="%VITE_APP_URL%/assets/img/logo/nuwault_logo_horizontal_teal_360px.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="tr_TR" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="%VITE_APP_NAME% - %VITE_APP_TITLE%" />
    <meta property="twitter:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="twitter:url" content="%VITE_APP_URL%/" />
    <meta property="twitter:image" content="%VITE_APP_URL%/assets/img/logo/nuwault_logo_horizontal_teal_360px.png" />

    <link rel="canonical" href="%VITE_APP_URL%/" />
    <link rel="alternate" hreflang="x-default" href="%VITE_APP_URL%/" />
    <link rel="alternate" hreflang="en" href="%VITE_APP_URL%/" />
    <link rel="alternate" hreflang="tr" href="%VITE_APP_URL%/" />
    
    <script src="/redirect.js" defer></script>

    <title>%VITE_APP_NAME% - %VITE_APP_TITLE%</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "%VITE_APP_NAME%",
      "url": "%VITE_APP_URL%/",
      "description": "%VITE_APP_DESCRIPTION%",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "All",
      "browserRequirements": "Requires JavaScript",
      "inLanguage": ["en", "tr"],
      "availableLanguage": [
        { "@type": "Language", "name": "English", "alternateName": "en" },
        { "@type": "Language", "name": "Turkish", "alternateName": "tr" }
      ],
      "isAccessibleForFree": true,
      "keywords": "%VITE_APP_KEYWORDS%",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "%VITE_APP_AUTHOR%",
        "url": "%VITE_SOCIAL_GITHUB%"
      }
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="font-family:sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem">
        <h1>Nuwault – Secure &amp; Deterministic Passwords</h1>
        <p>Nuwault is a privacy-first, offline password generator that creates secure and deterministic passwords from your keywords. No cloud, no storage – just pure cryptographic logic.</p>
        <p>Please enable JavaScript to use Nuwault.</p>
      </div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
